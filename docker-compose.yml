services:
  postgres:
    image: postgres:17
    ports: 
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pg-data:/var/lib/pg/data
  
  minio:
    image: minio/minio
    command: server /var/lib/minio/data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/var/lib/minio/data

  backend:
    image: randomrandoms/picstore-back
    ports: 
      - "3000:3000"
    depends_on:
      - postgres
      - minio
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_DB: postgres
      RUST_LOG: info

volumes:
  pg-data:
  minio-data:

networks:
  web:
    driver: bridge
