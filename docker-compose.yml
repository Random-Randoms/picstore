services:
  postgres:
    image: postgres:17
    ports: 
      - "$PG_PORT:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pg-data:/var/lib/pg/data
  
  minio:
    image: minio/minio
    command: server /var/lib/minio/data --console-address ":9001"
    ports:
      - "$MINIO_API_PORT:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/var/lib/minio/data

  backend:
    image: randomrandoms/picstore-back
    command: cargo run --release
    ports: 
      - "$BACKEND_PORT:3000"
    depends_on:
      - postgres
      - minio
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_DB: postgres
      RUST_LOG: info
      PG_PORT: $PG_PORT
      MINIO_API_PORT: $MINIO_API_PORT

volumes:
  pg-data:
  minio-data:

networks:
  web:
    driver: bridge
